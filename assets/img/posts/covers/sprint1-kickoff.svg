<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Granite Lifeline three-layer system architecture</title>
  <rect width="1200" height="630" fill="#F4F8FF"/>

  <!-- Three architecture layers, vertically centered -->
  <g font-family="Arial, sans-serif" font-weight="700">
    <rect x="140" y="120" width="920" height="110" rx="16" fill="#0F62FE"/>
    <text x="600" y="184" font-size="34" fill="#FFFFFF" text-anchor="middle">Data Layer</text>

    <rect x="140" y="260" width="920" height="110" rx="16" fill="#4589FF"/>
    <text x="600" y="324" font-size="34" fill="#FFFFFF" text-anchor="middle">Model Layer</text>

    <rect x="140" y="400" width="920" height="110" rx="16" fill="#001D6C"/>
    <text x="600" y="464" font-size="34" fill="#FFFFFF" text-anchor="middle">Report Layer</text>
  </g>

  <!-- connecting arrows -->
  <g fill="#0F62FE">
    <path d="M584,234 h32 l-16,20 z"/>
    <path d="M584,374 h32 l-16,20 z"/>
  </g>
</svg>
