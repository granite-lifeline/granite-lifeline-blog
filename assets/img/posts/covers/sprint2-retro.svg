<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Sprint 2 retrospective checklist across four delivery layers</title>
  <rect width="1200" height="630" fill="#F4F8FF"/>

  <!-- decorative retrospective cycle ring, concentric with the card below (both centered at 600,315) -->
  <circle cx="600" cy="315" r="250" fill="none" stroke="#A6C8FF" stroke-width="18"/>
  <path d="M864,315 l-30,-16 v32 z" fill="#A6C8FF"/>

  <!-- checklist card, centered in the canvas -->
  <g fill="#FFFFFF" stroke="#0F62FE" stroke-width="4">
    <rect x="380" y="155" width="440" height="320" rx="18"/>
  </g>
  <g fill="#24A148">
    <circle cx="440" cy="225" r="18"/>
    <circle cx="440" cy="295" r="18"/>
    <circle cx="440" cy="365" r="18"/>
    <circle cx="440" cy="435" r="18"/>
  </g>
  <g fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M431,225 L438,233 L452,215"/>
    <path d="M431,295 L438,303 L452,285"/>
    <path d="M431,365 L438,373 L452,355"/>
    <path d="M431,435 L438,443 L452,425"/>
  </g>
  <g fill="#001D6C">
    <rect x="490" y="215" width="260" height="18" rx="9"/>
    <rect x="490" y="285" width="210" height="18" rx="9"/>
    <rect x="490" y="355" width="235" height="18" rx="9"/>
    <rect x="490" y="425" width="190" height="18" rx="9"/>
  </g>
</svg>
