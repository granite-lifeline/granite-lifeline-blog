theme: jekyll-theme-chirpy

lang: en
timezone: Europe/London

title: Granite Lifeline
tagline: Engine Component Failure Predictor
description: Granite Lifeline is an IBM-sponsored MSc Computer Science project at the University of Bristol. This blog documents the development journey of an engine component failure prediction system, built using IBM Granite TTM for anomaly detection and IBM Granite LLM for natural language diagnostic reports, trained on the KIT Automotive OBD-II dataset.

url: "https://granite-lifeline.github.io"
baseurl: "/granite-lifeline-blog"

github:
  username: granite-lifeline

social:
  name: Granite Lifeline
  links:
    - https://github.com/granite-lifeline

avatar: /assets/img/avatar.svg

toc: true
comments:
  provider:

paginate: 10

pwa:
  enabled: true
  cache:
    enabled: true

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
